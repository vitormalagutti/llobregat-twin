# Station metadata — Llobregat Watershed Monitoring Dashboard
# Verified against live ACA Sentilo API and AEMET OpenData inventory (2026-03-25).
#
# ACA sensor naming convention (confirmed from catalogue):
#   ANA sensors → direct physical measurements (stage in m, cota in m a.s.l.)
#   CALC sensors → derived values (flow m3/s calculated from rating curve; volume hm3)
#
# Each gauge/reservoir entry must have: component_id, provider, and sensor IDs.

