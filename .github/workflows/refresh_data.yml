name: Refresh watershed data

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:           # Allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to push updated cache files

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch all data sources
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          ACA_API_KEY: ${{ secrets.ACA_API_KEY }}
        run: python -m data.fetchers.refresh_all

      - name: Commit updated cache files
        run: |
          git config user.name "llobregat-data-bot"
          git config user.email "bot@llobregat-twin.noreply"
          git add data/cache/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: refresh data cache $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Push to repository
        run: git push
